<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextinel - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400&family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <span class="logo-text">./portfolio</span>
        </div>

        <div class="nav-buttons">
            <a href="#hero" button class="nav-button">Home</button></a>
            <a href="#work" button class="nav-button">Projects</button></a>
            <a href="#contacts" button class="nav-button">Contact</button></a>
        </div>
    </header>

    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="video-container"></div>
        </div>
    </div>

    <main>
        <section id="hero">
            <div class="hero-content">
                <h1>Nextinel</h1>
                <p id="developer-title">> developer</p>
            </div>
        </section>

        <section id="work">
            <h2>My Projects</h2>
            <div id="video-gallery">
                <!-- Videos will be loaded here -->
            </div>
        </section>

        <section id="contacts">
            <h2>Contact</h2>
            <div class="discord-contact-container">
                <a href="https://discord.com/users/nextinel" target="_blank" rel="noopener noreferrer">
                    <img src="dc_icon.png" alt="Discord Icon" class="discord-icon-img">
                </a>
                
                <div>
                    <img class="discord-pfp" src="dc_pfp.png" alt="Discord""></img>

                    <span class="discord-nickname">
                        nextinel
                    </span>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Nextinel. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
